version: '3.8'

services:
  # ── Database ─────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: weaponscan
      POSTGRES_USER: weaponscan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weaponscan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Message Broker ───────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API Server ───────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://weaponscan:${DB_PASSWORD:-changeme}@db:5432/weaponscan
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=weaponscan.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-development-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Inference Worker ─────────────────────────
  worker:
    build: .
    command: >
      celery -A weaponscan worker
      --queues=inference,default
      --concurrency=1
      --loglevel=info
      --without-heartbeat
      --without-mingle
    stop_grace_period: 300s
    environment:
      - DATABASE_URL=postgres://weaponscan:${DB_PASSWORD:-changeme}@db:5432/weaponscan
      - CELERY_BROKER_URL=redis://redis:6379/0
      - MODEL_PATH=/app/models/best.onnx
      - SECRET_KEY=${SECRET_KEY:-django-insecure-development-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    volumes:
      - media_data:/app/media
      - ./models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Scheduler (Celery Beat) ──────────────────
  beat:
    build: .
    command: celery -A weaponscan beat --loglevel=info
    environment:
      - DATABASE_URL=postgres://weaponscan:${DB_PASSWORD:-changeme}@db:5432/weaponscan
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-django-insecure-development-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
